name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the workflow problem before proposing a solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Include success, empty, loading, error, and cancellation states where relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Offline, performance, and accessibility impact
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This can operate fully offline.
          required: true
        - label: I searched existing issues and the roadmap.
          required: true
