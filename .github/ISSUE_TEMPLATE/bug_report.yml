name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Do not report security vulnerabilities publicly; follow SECURITY.md."
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.5.0-beta or commit SHA
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows 10/11, Ubuntu/Linux, macOS Intel, macOS Apple Silicon, Other]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use a minimal project and remove private source or paths.
      placeholder: "1. Open...\n2. Select...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove credentials, usernames, private source, input, and output.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: This is not a security vulnerability.
          required: true
